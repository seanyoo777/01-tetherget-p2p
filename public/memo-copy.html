## 요약

- **온체인**: Base 비수탁 에스크로, 멀티시그·SuperAdmin, 프론트 wagmi 연동.
- **모노레포**: tetherget-platform(Turbo+pnpm), @tetherget/core(TypeScript). MVP는 file: 링크로 core 연결(Turbo가 루트 밖 workspace 패키지 불허).
- **강경 사용자 보호**: 전 거래 신분증(관리자 스위치), Buyer만 송금확인, 300만원+ 푸시+앱 재확인, 송금자=Buyer KYC로 지연/즉시·친구 즉시, IP·지문·블랙리스트·다중계정·사고 자동차단.
- **P2P UI (4단계)**: **p2pRiskBridge.js** — 매칭·송금확인·고액 모달·정산 안내; **/owner** 스위치(localStorage).
- **P2P 5단계 (완료)**: **브리지** — buildDefaultP2pRawSignals, preflightSellerNewListing, preflightMatchedTradeContinue, 관리자 KYC UI + /owner.
- **P2P 6단계 (완료)**: **서버** server/risk/p2pCoreGate.js — 판매·take·payment-start·mark-paid 에 **@tetherget/core** 동일 게이트; **mark-paid** 본문 고액 플래그 서버 재검증; **KYC 스위치** SQLite **platform_settings**(키 **kyc.admin_switches_v1**) + GET/PUT API; 클라 로그인 시 GET 동기화·관리자 PUT; **onchainP2pBridge.js** — buyerAck UX ↔ **confirmReceipt** 패턴; **League 준비** — policy 상수 + **isLeaguePriceSnapshotStale**.
- **거래소 패키지 (활성·확장)**: **@tetherget/exchange** — Bitget **ticker + books5/15** 공개 WS; **ExchangeDeskShell**이 **mode**(live·paper·league)·**TossHeroMetrics**·**TossOrderBook**·**TossMiniPriceChart**·**TossOrderPanel**·**ExchangeDeskLayout**(데스크 3열); 모바일 **TossMobileMarketTabs**(차트↔호가) + 주문 **sticky**·safe-area; **integration/fromCore.js**에 **wagmi·KYC·지문 + referral**(allocateReferralPool 등) 재수출; 텔레메트리 **buildExchangeTelemetrySnapshot**; MVP 경로 **/exchange** (**ExchangeRoute.jsx**·main.jsx 분기·prebuild turbo exchange); **ExchangeTradeShell** → DeskShell 래퍼.
- **레퍼럴 (core/referral)**: **P2P** 징수 거래 수수료 **전액**을 레퍼럴 풀로 간주; **League** 참가비의 **10%**를 풀; 관리자가 **1~N단계** 만분율(bps 합=10_000) 자유 설정·단계 상한 없음; **allocateReferralPool** + **buildReferralAuditEntry** 로 분배·감사 로그; 예시 **packages/core/examples/referralPool.example.ts**.
- **실행 공백 → 7단계**: 주문↔온체인 escrow ID 자동 매핑·인덱서, 푸시 발송 로그 DB, Redis/League 세션 엔진, 서버 게이트 단위 테스트; 레퍼럴 분배 스냅샷·감사 테이블 영속화; 거래소는 UI 데모 경로 **/exchange** 까지 연결됨 — 접근제어·실주문 API·관측 파이프는 선택 과제.
